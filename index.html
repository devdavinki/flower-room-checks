<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flower Room Daily Checks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1410;
    --surface: #161d17;
    --surface2: #1d2620;
    --surface3: #243028;
    --border: #2e3d30;
    --accent: #7ec87a;
    --accent2: #4a9e45;
    --accent-dim: rgba(126,200,122,0.12);
    --accent-glow: rgba(126,200,122,0.06);
    --text: #e8f0e8;
    --text-dim: #8fa48f;
    --text-muted: #536653;
    --red: #e07070;
    --amber: #d4a85a;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; box-shadow: 0 0 10px var(--accent); }
    50% { opacity: 0.6; box-shadow: 0 0 4px var(--accent); }
  }
  .header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }
  .header-actions { display: flex; gap: 10px; }
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 9px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--text-muted); }
  .btn-primary {
    background: var(--accent);
    color: #0a1009;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { background: #92d98e; }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: rgba(224,112,112,0.3);
  }
  .btn-danger:hover { background: rgba(224,112,112,0.1); }

  /* ── MAIN ── */
  .main { padding: 28px 24px; max-width: 900px; margin: 0 auto; }

  /* ── META SECTION ── */
  .meta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .field-input, .field-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 10px 12px;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-input:focus, .field-select:focus {
    border-color: var(--accent2);
    background: var(--surface3);
  }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 13px;
  }

  /* ── ROOM ENV SECTION ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .section-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(126,200,122,0.2);
    padding: 3px 9px;
    border-radius: 4px;
  }
  .section-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .env-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  /* ── TABLE CARD ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .table-card-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .table-badge {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(126,200,122,0.25);
    padding: 4px 10px;
    border-radius: 5px;
    text-transform: uppercase;
  }
  .table-card-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .side-section {
    padding: 16px 18px;
  }
  .side-section:first-child {
    border-right: 1px solid var(--border);
  }
  .side-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .side-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .side-label.front::before { background: var(--accent); }
  .side-label.back::before { background: var(--amber); }

  .readings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  /* unit hint */
  .unit-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    background: var(--surface2);
    border-radius: 3px;
    height: 4px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── ENTRY LIST ── */
  .entries-section {
    margin-top: 32px;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }
  .entry-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .entry-row-left { display: flex; gap: 16px; align-items: center; }
  .entry-tag {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(126,200,122,0.2);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }
  .entry-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .entry-delete:hover { color: var(--red); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 24px;
    background: var(--accent);
    color: #0a1009;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* ── PRINT ── */
  @media print {
    body { background: white; color: #111; }
    .header-actions, .btn, .entry-delete, .progress-bar { display: none !important; }
    .header { background: white; border-bottom: 2px solid #ccc; position: static; }
    .header h1 { color: #111; }
    .logo-dot { background: #4a9e45; box-shadow: none; animation: none; }
    .meta-card, .env-card, .table-card, .entry-row {
      background: white; border-color: #ccc; break-inside: avoid;
    }
    .table-card-header { background: #f5f5f5; }
    .field-input, .field-select, .side-section {
      background: white; color: #111; border-color: #ccc;
    }
    .section-tag { background: #e8f5e8; color: #2a6e27; border-color: #b5d6b3; }
    .table-badge { background: #e8f5e8; color: #2a6e27; }
    .unit-hint, .field-label, .side-label { color: #777; }
    .entries-section { display: none; }
  }

  @media (max-width: 600px) {
    .meta-card { grid-template-columns: 1fr 1fr; }
    .env-card { grid-template-columns: 1fr 1fr; }
    .readings-grid { grid-template-columns: 1fr 1fr; }
    .header h1 { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-dot"></div>
    <h1>Flower Room · Daily Check</h1>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportCSV()">↓ CSV</button>
    <button class="btn btn-ghost" onclick="window.print()">⎙ Print</button>
    <button class="btn btn-primary" onclick="saveEntry()">Save Entry</button>
    <button class="btn btn-danger" onclick="clearForm()">Clear</button>
  </div>
</div>

<div class="main">

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <!-- META -->
  <div class="meta-card">
    <div class="field-group">
      <label class="field-label">Date</label>
      <input type="date" class="field-input" id="date">
    </div>
    <div class="field-group">
      <label class="field-label">Time</label>
      <input type="time" class="field-input" id="time">
    </div>
    <div class="field-group">
      <label class="field-label">Room #</label>
      <div class="select-wrap">
        <select class="field-select" id="room" onchange="renderTables()">
          <option value="">— Select —</option>
          <option>R1</option><option>R2</option><option>R3</option>
          <option>R4</option><option>R5</option><option>R6</option>
          <option>R7</option><option>R8</option><option>R9</option>
          <option>R10</option><option>R11</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ENV -->
  <div class="section-header">
    <span class="section-tag">Environment</span>
    <span class="section-title">Room Conditions</span>
  </div>
  <div class="env-card">
    <div class="field-group">
      <label class="field-label">Rel. Humidity</label>
      <input type="number" step="0.1" class="field-input" id="rh" placeholder="—">
      <div class="unit-hint">%</div>
    </div>
    <div class="field-group">
      <label class="field-label">Room Temp</label>
      <input type="number" step="0.1" class="field-input" id="room_temp" placeholder="—">
      <div class="unit-hint">°F</div>
    </div>
    <div class="field-group">
      <label class="field-label">Leaf Surface Temp</label>
      <input type="number" step="0.1" class="field-input" id="leaf_temp" placeholder="—">
      <div class="unit-hint">°F</div>
    </div>
    <div class="field-group">
      <label class="field-label">Dewpoint</label>
      <input type="number" step="0.1" class="field-input" id="dewpoint" placeholder="—">
      <div class="unit-hint">°F</div>
    </div>
  </div>

  <!-- TABLES -->
  <div class="section-header">
    <span class="section-tag">Runoff</span>
    <span class="section-title">Table Readings</span>
  </div>
  <div id="tables-container">
    <div class="empty-state">← Select a room above to load tables</div>
  </div>

  <!-- SAVED ENTRIES -->
  <div class="entries-section" id="entries-section" style="display:none;">
    <div class="section-header">
      <span class="section-tag">Log</span>
      <span class="section-title">Saved Entries</span>
    </div>
    <div id="entries-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const ROOM_TABLES = {
    R1:2, R2:3, R3:3, R4:3, R5:3,
    R6:2, R7:3, R8:3, R9:2, R10:3, R11:3
  };

  let savedEntries = JSON.parse(localStorage.getItem('flowerChecks') || '[]');

  // Set defaults
  const now = new Date();
  document.getElementById('date').value = now.toISOString().split('T')[0];
  document.getElementById('time').value = now.toTimeString().slice(0,5);

  function renderTables() {
    const room = document.getElementById('room').value;
    const container = document.getElementById('tables-container');
    if (!room) {
      container.innerHTML = '<div class="empty-state">← Select a room above to load tables</div>';
      updateProgress();
      return;
    }
    const count = ROOM_TABLES[room];
    let html = '';
    for (let t = 1; t <= count; t++) {
      html += `
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-badge">Table ${t}</span>
        </div>
        <div class="table-card-body">
          <div class="side-section">
            <div class="side-label front">Front</div>
            <div class="readings-grid">
              <div class="field-group">
                <label class="field-label">Volume</label>
                <input type="number" step="1" class="field-input" id="t${t}_front_vol" placeholder="—" oninput="updateProgress()">
                <div class="unit-hint">mL</div>
              </div>
              <div class="field-group">
                <label class="field-label">EC</label>
                <input type="number" step="1" class="field-input" id="t${t}_front_ec" placeholder="—" oninput="updateProgress()">
                <div class="unit-hint">ppm</div>
              </div>
              <div class="field-group">
                <label class="field-label">pH</label>
                <input type="number" step="0.1" min="0" max="14" class="field-input" id="t${t}_front_ph" placeholder="—" oninput="updateProgress()">
                <div class="unit-hint">0–14</div>
              </div>
            </div>
          </div>
          <div class="side-section">
            <div class="side-label back">Back</div>
            <div class="readings-grid">
              <div class="field-group">
                <label class="field-label">Volume</label>
                <input type="number" step="1" class="field-input" id="t${t}_back_vol" placeholder="—" oninput="updateProgress()">
                <div class="unit-hint">mL</div>
              </div>
              <div class="field-group">
                <label class="field-label">EC</label>
                <input type="number" step="1" class="field-input" id="t${t}_back_ec" placeholder="—" oninput="updateProgress()">
                <div class="unit-hint">ppm</div>
              </div>
              <div class="field-group">
                <label class="field-label">pH</label>
                <input type="number" step="0.1" min="0" max="14" class="field-input" id="t${t}_back_ph" placeholder="—" oninput="updateProgress()">
                <div class="unit-hint">0–14</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }
    container.innerHTML = html;
    updateProgress();
  }

  function updateProgress() {
    const room = document.getElementById('room').value;
    if (!room) { document.getElementById('progress').style.width = '0%'; return; }
    const count = ROOM_TABLES[room];
    const fields = ['date','time','room','rh','room_temp','leaf_temp','dewpoint'];
    for (let t = 1; t <= count; t++) {
      ['front','back'].forEach(s => {
        ['vol','ec','ph'].forEach(f => fields.push(`t${t}_${s}_${f}`));
      });
    }
    let filled = 0;
    fields.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.value.trim() !== '') filled++;
    });
    const pct = Math.round((filled / fields.length) * 100);
    document.getElementById('progress').style.width = pct + '%';
  }

  function getFormData() {
    const room = document.getElementById('room').value;
    if (!room) return null;
    const count = ROOM_TABLES[room];
    const entry = {
      id: Date.now(),
      date: document.getElementById('date').value,
      time: document.getElementById('time').value,
      room,
      rh: document.getElementById('rh').value,
      room_temp: document.getElementById('room_temp').value,
      leaf_temp: document.getElementById('leaf_temp').value,
      dewpoint: document.getElementById('dewpoint').value,
      tables: []
    };
    for (let t = 1; t <= count; t++) {
      entry.tables.push({
        table: t,
        front: {
          vol: document.getElementById(`t${t}_front_vol`)?.value || '',
          ec:  document.getElementById(`t${t}_front_ec`)?.value || '',
          ph:  document.getElementById(`t${t}_front_ph`)?.value || '',
        },
        back: {
          vol: document.getElementById(`t${t}_back_vol`)?.value || '',
          ec:  document.getElementById(`t${t}_back_ec`)?.value || '',
          ph:  document.getElementById(`t${t}_back_ph`)?.value || '',
        }
      });
    }
    return entry;
  }

  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz7-pRO6encj5j8vP6KlqA6vsWhJIFDrcrnzSwPGfKNZAj42_gLhrP6x265wk6FANaP/exec';

  async function saveEntry() {
    const entry = getFormData();
    if (!entry || !entry.room) { showToast('Select a room first'); return; }

    // Save locally first
    savedEntries.push(entry);
    localStorage.setItem('flowerChecks', JSON.stringify(savedEntries));
    renderEntries();

    // Push to Google Sheets
    const btn = document.querySelector('.btn-primary');
    const orig = btn.textContent;
    btn.textContent = 'Syncing...';
    btn.disabled = true;
    btn.style.opacity = '0.7';

    try {
      const sends = entry.tables.map(t => {
        const flat = new URLSearchParams({
          date: entry.date, time: entry.time, room: entry.room,
          rh: entry.rh, room_temp: entry.room_temp,
          leaf_temp: entry.leaf_temp, dewpoint: entry.dewpoint,
          table: 'Table ' + t.table,
          front_vol: t.front.vol, front_ec: t.front.ec, front_ph: t.front.ph,
          back_vol: t.back.vol, back_ec: t.back.ec, back_ph: t.back.ph
        }).toString();
        return fetch(SHEETS_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: flat
        });
      });
      await Promise.all(sends);
      showToast('Saved → Google Sheets ✓');
    } catch(err) {
      showToast('Saved locally — sheet sync failed');
      console.error(err);
    } finally {
      btn.textContent = orig;
      btn.disabled = false;
      btn.style.opacity = '1';
    }
  }

  function deleteEntry(id) {
    savedEntries = savedEntries.filter(e => e.id !== id);
    localStorage.setItem('flowerChecks', JSON.stringify(savedEntries));
    renderEntries();
  }

  function renderEntries() {
    const sec = document.getElementById('entries-section');
    const list = document.getElementById('entries-list');
    if (savedEntries.length === 0) { sec.style.display = 'none'; return; }
    sec.style.display = 'block';
    list.innerHTML = savedEntries.slice().reverse().map(e => `
      <div class="entry-row">
        <div class="entry-row-left">
          <span class="entry-tag">${e.room}</span>
          <span>${e.date} ${e.time}</span>
          <span style="color:var(--text-muted)">${e.tables.length} table${e.tables.length>1?'s':''}</span>
          <span style="color:var(--text-muted)">RH ${e.rh||'—'}%  Temp ${e.room_temp||'—'}°F</span>
        </div>
        <button class="entry-delete" onclick="deleteEntry(${e.id})">✕</button>
      </div>
    `).join('');
  }

  function clearForm() {
    document.getElementById('room').value = '';
    document.getElementById('rh').value = '';
    document.getElementById('room_temp').value = '';
    document.getElementById('leaf_temp').value = '';
    document.getElementById('dewpoint').value = '';
    document.getElementById('tables-container').innerHTML = '<div class="empty-state">← Select a room above to load tables</div>';
    const now = new Date();
    document.getElementById('date').value = now.toISOString().split('T')[0];
    document.getElementById('time').value = now.toTimeString().slice(0,5);
    updateProgress();
    showToast('Form cleared');
  }

  function exportCSV() {
    if (savedEntries.length === 0) { showToast('No saved entries yet'); return; }
    const rows = [['Date','Time','Room','RH%','Room Temp °F','Leaf Temp °F','Dewpoint °F','Table','Side','Volume mL','EC ppm','pH']];
    savedEntries.forEach(e => {
      e.tables.forEach(t => {
        rows.push([e.date,e.time,e.room,e.rh,e.room_temp,e.leaf_temp,e.dewpoint,t.table,'Front',t.front.vol,t.front.ec,t.front.ph]);
        rows.push([e.date,e.time,e.room,e.rh,e.room_temp,e.leaf_temp,e.dewpoint,t.table,'Back',t.back.vol,t.back.ec,t.back.ph]);
      });
    });
    const csv = rows.map(r => r.map(v => `"${v||''}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = `flower-checks-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast('CSV downloaded ✓');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Init
  renderEntries();
  updateProgress();

  // Auto-update progress on env fields
  ['rh','room_temp','leaf_temp','dewpoint'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateProgress);
  });
</script>
</body>
</html>
